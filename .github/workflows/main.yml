name: Crypto Trading Bot

on:
  # Run every 5 minutes — tight enough to catch 15-min windows
  schedule:
    - cron: '*/5 * * * *'

  # Allow manual trigger with option to use live trading
  workflow_dispatch:
    inputs:
      paper_trading:
        description: 'Paper trading mode (true = safe simulation)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  # Prevent overlapping runs — only one bot at a time
  group: crypto-bot
  cancel-in-progress: false

jobs:
  trade:
    name: Run Trading Bot
    runs-on: ubuntu-latest
    timeout-minutes: 4   # must finish before next 5-min run starts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Restore position state from cache so the bot remembers open trades
      # across runs (GitHub Actions runners are stateless)
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: /tmp/bot_state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Run trading bot
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:   ${{ secrets.ALPACA_API_SECRET }}
          LLM_API_KEY:         ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:        ${{ vars.LLM_BASE_URL || 'https://openrouter.ai/api/v1' }}
          LLM_MODEL_PRIMARY:   ${{ vars.LLM_MODEL_PRIMARY || vars.LLM_MODEL || 'meta-llama/llama-3.1-8b-instruct' }}
          LLM_MODEL_SECONDARY: ${{ vars.LLM_MODEL_SECONDARY || 'qwen/qwen-2.5-7b-instruct' }}
          # Default to paper trading unless explicitly disabled
          PAPER_TRADING: ${{ github.event.inputs.paper_trading || 'true' }}
        run: node index.js

      # Save updated state for next run
      - name: Save state cache
        if: always()
        uses: actions/cache@v4
        with:
          path: /tmp/bot_state.json
          key: bot-state-${{ github.run_id }}
